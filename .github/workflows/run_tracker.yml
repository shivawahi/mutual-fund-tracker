name: Mutual Fund Tracker

on:
  # Runs Mon–Fri at 4:30 AM UTC = 10:00 AM IST
  schedule:
    - cron: "30 4 * * 1-5"

  # Manual trigger from GitHub UI with optional date
  workflow_dispatch:
    inputs:
      date:
        description: "Optional date DD/MM/YYYY (leave blank for today)"
        required: false
        default: ""

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env from secrets
        run: |
          echo "LOGIN_URL=${{ secrets.LOGIN_URL }}"                         >> .env
          echo "INVESTMENT_USERNAME=${{ secrets.INVESTMENT_USERNAME }}"     >> .env
          echo "INVESTMENT_PASSWORD=${{ secrets.INVESTMENT_PASSWORD }}"     >> .env
          echo "GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}"          >> .env
          echo "SERVICE_ACCOUNT_FILE=service_account.json"                 >> .env

      - name: Create service account JSON from secret
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run tracker
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python tracker.py --date "${{ github.event.inputs.date }}"
          else
            python tracker.py
          fi

      - name: Fix chart color if new sheet was created
        run: |
          if [ -f "new_sheet_created.flag" ]; then
            MONTH=$(cat new_sheet_created.flag)
            echo "New sheet detected: $MONTH"
            python fix_chart_color.py "$MONTH"
            rm new_sheet_created.flag
          else
            echo "No new sheet created — skipping fix_chart_color.py"
          fi

      - name: Read tracker log
        if: always()
        id: read_log
        run: |
          if [ -f "logs/tracker.log" ]; then
            # Get last 50 lines of log to keep email concise
            LOG=$(tail -50 logs/tracker.log)
          else
            LOG="No log file found."
          fi
          # Save to env (multiline safe)
          echo "LOG_CONTENT<<EOF" >> $GITHUB_ENV
          echo "$LOG"             >> $GITHUB_ENV
          echo "EOF"              >> $GITHUB_ENV

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tracker-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: Mutual Fund Tracker <${{ secrets.EMAIL_USERNAME }}>
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Finance First Mutual Fund Tracker — ${{ job.status }} (Run ${{ github.run_number }})"
          body: |
            Finance First Mutual Fund Tracker — Daily Execution Report
            ═══════════════════════════════════════════════

            Status     : ${{ job.status == 'success' && '✅ SUCCESS' || '❌ FAILED' }}
            Run Number : ${{ github.run_number }}
            Triggered  : ${{ github.event_name }}
            Date param : ${{ github.event.inputs.date || 'today' }}
            Run URL    : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ── TRACKER LOG (last 50 lines) ──────────────────────
            ${{ env.LOG_CONTENT }}
            ─────────────────────────────────────────────────────

            Full logs + artifacts:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
